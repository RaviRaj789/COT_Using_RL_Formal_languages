run_name: parity_grpo_curriculum_boundary
seed: 4

task:
  name: parity

algorithm:
  name: grpo_process_terminal
  groups_per_step: 2
  samples_per_prompt: 4
  clip_eps: 0.1
  entropy_coef: 0.0
  process_weight: 2.0
  terminal_weight: 1.0

train:
  steps: 500
  batch_size: 4
  lr: 0.000003
  train_min_len: 1
  train_max_len: 40
  train_max_len_cap: 80
  log_every: 25
  eval_every: 0
  save_every: 100
  overwrite_run: false

model:
  d_model: 128
  n_heads: 4
  n_layers: 4
  d_ff: 512
  dropout: 0.0

generation:
  temperature: 0.25
  max_new_tokens: 64

eval_generation:
  temperature: 0.25
  max_new_tokens: 96
  max_length: 80

curriculum:
  stages:
    - name: preserve_1_40
      start_step: 1
      end_step: 100
      train_min_len: 1
      train_max_len: 40
      temperature: 0.25
      max_new_tokens: 64
      process_weight: 2.0
      terminal_weight: 1.0

    - name: boundary_35_44
      start_step: 101
      end_step: 250
      train_min_len: 35
      train_max_len: 44
      temperature: 0.25
      max_new_tokens: 56
      process_weight: 2.0
      terminal_weight: 1.0

    - name: boundary_38_48
      start_step: 251
      end_step: 375
      train_min_len: 38
      train_max_len: 48
      temperature: 0.2
      max_new_tokens: 60
      process_weight: 1.5
      terminal_weight: 1.0

    - name: boundary_40_52
      start_step: 376
      end_step: 500
      train_min_len: 40
      train_max_len: 52
      temperature: 0.2
      max_new_tokens: 64
      process_weight: 1.25
      terminal_weight: 1.0