run_name: parity_grpo_from_sft
seed: 1
task:
  name: parity
algorithm:
  name: grpo_process_terminal
  groups_per_step: 4
  samples_per_prompt: 2
  clip_eps: 0.2
  entropy_coef: 0.02
  process_weight: 2.0
  terminal_weight: 1.0
train:
  steps: 1000
  batch_size: 4
  lr: 0.00005
  train_min_len: 1
  train_max_len: 40
  log_every: 50
  eval_every: 500
model:
  d_model: 128
  n_heads: 4
  n_layers: 4
  d_ff: 512
  dropout: 0.0
generation:
  temperature: 0.8
  max_new_tokens: 160
