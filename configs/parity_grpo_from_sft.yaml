run_name: parity_grpo_from_sft_safe
seed: 1

task:
  name: parity

algorithm:
  name: grpo_process_terminal
  groups_per_step: 2
  samples_per_prompt: 4
  clip_eps: 0.1
  entropy_coef: 0.0
  process_weight: 2.0
  terminal_weight: 1.0

train:
  steps: 300
  batch_size: 4
  lr: 0.000005
  train_min_len: 1
  train_max_len: 40
  log_every: 25
  eval_every: 50

model:
  d_model: 128
  n_heads: 4
  n_layers: 4
  d_ff: 512
  dropout: 0.0

# Used during GRPO training rollouts.
generation:
  temperature: 0.3
  max_new_tokens: 64

# Used only for periodic/manual eval after patching train.py/eval.py.
eval_generation:
  max_new_tokens: 200
